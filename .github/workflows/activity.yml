name: Update README Activity

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up gh and get activity
        run: |
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          gh auth status
          
          # Get repo activity (for odzorp/About-me)
          ACT_COUNT=$(gh api repos/odzorp/About-me/events --limit 20 2>/dev/null | grep -c '"type"' || echo "0")
          
          # Remove old activity section
          sed -i '/<!--START_SECTION:activity-->/,/<!--END_SECTION:activity-->/d' README.md 2>/dev/null || true
          
          {
            echo "<!--START_SECTION:activity-->"
            echo "- $ACT_COUNT recent event(s) in this repo"
            echo "<!--END_SECTION:activity-->"
          } > /tmp/activity.txt
          
          # Add to beginning of README
          if [ -s README.md ]; then
            cat /tmp/activity.txt README.md > /tmp/new_readme.md
            mv /tmp/new_readme.md README.md
          else
            cat /tmp/activity.txt > README.md
          fi
          
          echo "README updated with activity"
      
      - name: Commit and push
        run: |
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || (git commit -m "Update recent activity" && git push)