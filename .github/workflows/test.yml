name: Test Simple

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        
      - name: Test gh
        run: |
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          gh auth status
          gh repo view odzorp/About-me --json name